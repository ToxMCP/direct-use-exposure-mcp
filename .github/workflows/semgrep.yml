name: Semgrep SAST
on:
  pull_request:
  push:
    branches: [main, main, master]
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"
permissions:
  contents: read
jobs:
  semgrep:
    name: semgrep-sast
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.167.0
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep scan (free Community packs, gates on findings)
        run: semgrep scan --config p/python --config p/secrets --error --metrics=off src
